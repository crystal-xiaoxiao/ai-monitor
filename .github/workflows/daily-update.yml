name: Daily Data Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run daily update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "ai-monitor-bot"
          git config user.email "bot@ai-monitor"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
